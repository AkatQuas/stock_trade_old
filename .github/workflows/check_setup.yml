name: ✅ Check Setup

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run setup check
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ZHITU_TOKEN: ${{ secrets.ZHITU_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_SECRET: ${{ secrets.LARK_SECRET }}
          LARK_FOLDER_TOKEN: ${{ secrets.LARK_FOLDER_TOKEN }}
          ME_UNION_ID: ${{ secrets.ME_UNION_ID }}
        run: uv run python check_setup.py
